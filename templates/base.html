<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TechRent Pro{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">
    <nav class="bg-blue-600 p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <a href="/" class="text-white text-2xl font-bold">TechRent Pro</a>
            <div class="space-x-4">
                <a href="/" class="text-white hover:text-blue-200">Home</a>
                <a href="/equipment" class="text-white hover:text-blue-200">Equipment</a>
                <a href="#" class="text-white hover:text-blue-200">Customers</a>
                <a href="#" class="text-white hover:text-blue-200">Rentals</a>
            </div>
        </div>
    </nav>
    <div class="container mx-auto px-4 mt-4">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="p-4 mb-4 rounded-md shadow-sm 
            {% if category == 'success' %} bg-green-100 text-green-700 border border-green-200
            {% elif category == 'danger' %} bg-red-100 text-red-700 border border-red-200
            {% else %} bg-blue-100 text-blue-700 border border-blue-200 {% endif %}">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}
</div>

    <main class="container mx-auto mt-8 px-4">
        {% block content %}{% endblock %}
    </main>

    <footer class="mt-12 py-6 border-t border-gray-300 text-center text-gray-600">
        &copy; 2024 TechRent Pro. All rights reserved.
    </footer>
</body>
</html>
