{% extends 'base.html' %}

{% block title %}
    {% if item %}Edit {{ item.name }}{% else %}Add New Customer{% endif %} - TechRent Pro
{% endblock %}

{% block content %}
<div class="bg-white rounded-lg shadow-md p-8 max-w-3xl mx-auto">
    
    <!-- Dynamic Header -->
    <div class="mb-8 pb-4 border-b border-gray-200">
        <h1 class="text-3xl font-bold text-gray-800">
            {% if item %}
                Edit Customer: <span class="text-indigo-600">{{ item.name }}</span>
            {% else %}
                Add New Customer
            {% endif %}
        </h1>
    </div>

    <!-- The form will post to the current URL automatically -->
    <form method="POST" class="space-y-6">

        <!-- ID Field -->
        <div>
            <label for="id" class="block text-sm font-medium text-gray-700 mb-1">ID *</label>
            <input type="text" id="id" name="id" inputmode="numeric" oninput="this.value = this.value.replace(/[^0-9]/g, '');" maxlength="9" required 
                   value="{{ item.id if item else '' }}"
                   class="w-full border border-gray-300 rounded-md px-4 py-2 focus:ring-2 focus:ring-indigo-500 outline-none" 
                   placeholder="123456789">
        </div>
        
        <!-- Name Field -->
        <div>
            <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Name *</label>
            <input type="text" id="name" name="name" required 
                   value="{{ item.name if item else '' }}"
                   class="w-full border border-gray-300 rounded-md px-4 py-2 focus:ring-2 focus:ring-indigo-500 outline-none" 
                   placeholder="John Doe">
        </div>

        <!-- Email Field -->
        <div>
            <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email *</label>
            <input type="email" id="email" name="email" required 
                   value="{{ item.email if item else '' }}"
                   class="w-full border border-gray-300 rounded-md px-4 py-2 focus:ring-2 focus:ring-indigo-500 outline-none" 
                   placeholder="noemail@gmail.com">
        </div>

        <!-- phone Field -->
        <div>
            <label for="phone" class="block text-sm font-medium text-gray-700 mb-1">Phone *</label>
            <input type="text" id="phone" name="phone" inputmode="numeric" oninput="this.value = this.value.replace(/[^0-9]/g, '');"  maxlength="12" required 
                   value="{{ item.phone if item else '' }}"
                   class="w-full border border-gray-300 rounded-md px-4 py-2 focus:ring-2 focus:ring-indigo-500 outline-none" 
                   placeholder="" >
        </div>


        <!-- Action Buttons -->
        <div class="flex items-center space-x-4 pt-4">
            <button type="submit" class="px-6 py-2.5 bg-indigo-600 text-white text-sm font-medium rounded-md hover:bg-indigo-700 transition-colors shadow-sm">
                {% if item %}Save Changes{% else %}Add Custoemr{% endif %}
            </button>
            
            <a href="/customers" class="px-6 py-2.5 bg-white border border-gray-300 text-gray-700 text-sm font-medium rounded-md hover:bg-gray-50 transition-colors shadow-sm">
                Cancel
            </a>
        </div>

    </form>
</div>
{% endblock %}
