{% extends 'base.html' %}
{% block content %}
<div class="max-w-2xl mx-auto bg-white p-8 rounded-lg shadow-md">
    <h1 class="text-2xl font-bold mb-6">New Rental</h1>

    <form method="POST" class="space-y-4">
        <div>
            <label class="block text-sm font-medium">Customer</label>
            <select name="customer_id" required class="w-full border p-2 rounded">
                <option value="">Select Customer...</option>
                {% for c in customers %}
                <option value="{{ c.id }}" 
                    {% if item and item.customer_id|string == c.id|string %}selected{% endif %}>
                    {{ c.name }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label class="block text-sm font-medium">Equipment</label>
            <select name="equipment_id" id="equip-select" required class="w-full border p-2 rounded">
                <option value="">Select Equipment...</option>
                {% for e in equipment %}
                <option value="{{ e.id }}" data-rate="{{ e.daily_rate }}"
                    {% if item and item.equipment_id|string == e.id|string %}selected{% endif %}>
                    {{ e.name }} (${{ e.daily_rate }}/day)
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium">Start Date</label>
                <input type="date" name="start_date" id="start_date" required 
                    value="{{ item.start_date if item else '' }}"
                    class="w-full border p-2 rounded">
            </div>
            <div>
                <label class="block text-sm font-medium">End Date</label>
                <input type="date" name="end_date" id="end_date" required 
                    value="{{ item.end_date if item else '' }}"
                    class="w-full border p-2 rounded">
            </div>
        </div>

        <div class="p-4 bg-indigo-50 rounded-md border border-indigo-100">
            <p class="text-indigo-700 font-bold">Estimated Total: $<span id="total-cost">0.00</span></p>
        </div>

        <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded font-bold hover:bg-indigo-700">Confirm Rental</button>
    </form>
</div>
{% endblock %}
{% block scripts %}
<script>
    const startInput = document.getElementById('start_date');
    const endInput = document.getElementById('end_date');
    const equipSelect = document.getElementById('equip-select');
    const costDisplay = document.getElementById('total-cost');

    function calculateCost() {
        const start = new Date(startInput.value);
        const end = new Date(endInput.value);
        const selectedOption = equipSelect.options[equipSelect.selectedIndex];
        const rate = selectedOption ? parseFloat(selectedOption.getAttribute('data-rate')) : 0;

        if (start && end && end > start && rate) {
            const diffTime = Math.abs(end - start);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            costDisplay.innerText = (diffDays * rate).toFixed(2);
        } else {
            costDisplay.innerText = "0.00";
        }
    }

    [startInput, endInput, equipSelect].forEach(el => el.addEventListener('change', calculateCost));
    window.addEventListener('DOMContentLoaded', calculateCost);
</script>
{% endblock %}
